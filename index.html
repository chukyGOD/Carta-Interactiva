<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Una última conversación</title>

<style>
body {
  background: #0f0f0f;
  color: #f1f1f1;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  text-align: center;
  max-width: 520px;
  padding: 20px;
}

button {
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  background: #ffffff;
  color: #000;
  cursor: pointer;
}

button:hover {
  background: #cccccc;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
const app = document.getElementById("app");

function render(text, options) {
  app.innerHTML = "<p>" + text + "</p>";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt.text;
    btn.onclick = opt.next;
    app.appendChild(btn);
  });
}

// INICIO
function start() {
  render("Respóndeme con honestidad...<br><br><b>¿De verdad te gusté?</b>", [
    { text: "Sí", next: q1 },
    { text: "No", next: q2 }
  ]);
}

// SI
function q1() {
  render("Entonces dime algo...<br><br><b>¿En algún momento dejé de importarte?</b>", [
    { text: "Sí", next: q1a },
    { text: "No", next: q1b }
  ]);
}

function q1a() {
  render("¿Fue algo que hice...<br><br>o simplemente cambiaste?", [
    { text: "Fuiste tú", next: f1 },
    { text: "Cambié yo", next: f2 }
  ]);
}

function q1b() {
  render("Entonces necesito entender...<br><br><b>¿Por qué te alejaste?</b>", [
    { text: "Miedo", next: q3 },
    { text: "Perdí el interés", next: f3 }
  ]);
}

// NO
function q2() {
  render("Entonces explícame...<br><br><b>¿Por qué te quedaste conmigo?</b>", [
    { text: "No sé", next: q2a },
    { text: "No fue mi intención", next: q2b }
  ]);
}

function q2a() {
  render("¿Nunca sentiste nada real?<br><br><b>Ni siquiera un poco?</b>", [
    { text: "Sí, un poco", next: q4 },
    { text: "No", next: f4 }
  ]);
}

function q2b() {
  render("Entonces...<br><br><b>¿Te importó cómo me iba a sentir?</b>", [
    { text: "Sí", next: q4 },
    { text: "No", next: f5 }
  ]);
}

// PROFUNDIZAR
function q3() {
  render("Si fue miedo...<br><br><b>¿Miedo a perderme o miedo a sentir algo real?</b>", [
    { text: "Perderte", next: q5 },
    { text: "Sentir algo real", next: q5 }
  ]);
}

function q4() {
  render("Entonces hubo algo...<br><br><b>¿Por qué no lo intentaste de verdad?</b>", [
    { text: "No estaba listo/a", next: q5 },
    { text: "No eras suficiente", next: f6 }
  ]);
}

function q5() {
  render("Solo una cosa más...<br><br><b>¿Alguna vez pensaste en volver conmigo?</b>", [
    { text: "Sí", next: q6 },
    { text: "No", next: f7 }
  ]);
}

function q6() {
  render("Y si volvieras...<br><br><b>¿Sería diferente esta vez?</b>", [
    { text: "Sí", next: f8 },
    { text: "No", next: f7 }
  ]);
}

// FINALES

function f1() {
  render("Ojalá me lo hubieras dicho antes...<br><br>no después de hacerme sentir invisible.", []);
}

function f2() {
  render("Entonces supongo que nunca dependió de mí...<br><br>y eso duele distinto.", []);
}

function f3() {
  render("Perder el interés también es una respuesta...<br><br>aunque no sea la que quería.", []);
}

function f4() {
  render("Entonces todo fue una ilusión...<br><br>solo que yo sí la sentí real.", []);
}

function f5() {
  render("Eso explica muchas cosas...<br><br>aunque no las haga doler menos.", []);
}

function f6() {
  render("Tal vez nunca fui suficiente para ti...<br><br>pero eso no significa que no lo fuera.", []);
}

function f7() {
  render("Entonces ya tengo mi respuesta...<br><br>aunque no era la que quería aceptar.", []);
}

function f8() {
  render("Tal vez todavía hay algo...<br><br>pero esta vez no puede ser a medias.", []);
}

// START
start();
</script>

</body>
</html>
